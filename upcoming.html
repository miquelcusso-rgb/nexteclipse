<style>

.lang-btn:hover{color:rgba(220,160,50,.8);border-color:rgba(220,160,50,.4);}
.eyebrow{font-family:'Cinzel',serif;font-size:.78rem;letter-spacing:.45em;text-transform:uppercase;color:rgba(220,160,50,.48);margin-bottom:.5rem;}
h1{font-family:'Cinzel',serif;font-weight:300;font-size:clamp(1.6rem,4vw,2.4rem);color:rgba(255,248,228,.88);letter-spacing:.04em;margin-bottom:.4rem;}
.subtitle{font-size:1.05rem;font-style:italic;color:rgba(220,160,50,.52);margin-bottom:2.5rem;}
.filter-row{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:2rem;}
.filter-btn{font-family:'Cinzel',serif;font-size:.73rem;letter-spacing:.2em;text-transform:uppercase;padding:.4rem 1rem;border-radius:2px;cursor:pointer;border:1px solid rgba(220,160,50,.18);background:none;color:rgba(220,160,50,.5);transition:all .2s;}
.filter-btn:hover,.filter-btn.active{background:rgba(220,160,50,.08);border-color:rgba(220,160,50,.35);color:rgba(220,160,50,.8);}
.year-group{margin-bottom:2.5rem;}
.year-label{font-family:'Cinzel',serif;font-size:.85rem;letter-spacing:.4em;text-transform:uppercase;color:rgba(220,160,50,.35);margin-bottom:.8rem;padding-bottom:.5rem;border-bottom:1px solid rgba(220,160,50,.08);}
.eclipse-card{display:grid;grid-template-columns:2.5rem 1fr auto;gap:.8rem;align-items:start;padding:1rem 1.1rem;border:1px solid rgba(220,160,50,.07);border-radius:3px;background:rgba(220,160,50,.02);margin-bottom:.55rem;transition:border-color .2s;}
.eclipse-card:hover{border-color:rgba(220,160,50,.15);}
.card-icon{font-size:1.3rem;text-align:center;padding-top:.1rem;}
.card-body{}
.card-name{font-family:'Cinzel',serif;font-size:.9rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,248,220,.72);margin-bottom:.25rem;}
.card-vis{font-size:1rem;color:rgba(220,200,150,.55);margin-bottom:.15rem;}
.card-detail{font-size:.95rem;font-style:italic;color:rgba(220,180,100,.42);}
.card-date{font-family:'Cinzel',serif;font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(220,160,50,.48);white-space:nowrap;text-align:right;}
.card-passed{opacity:.4;}
.card-next .eclipse-card{border-color:rgba(220,160,50,.2);background:rgba(220,160,50,.04);}
.badge{display:inline-block;font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;padding:.15rem .5rem;border-radius:2px;background:rgba(220,160,50,.12);color:rgba(220,160,50,.7);border:1px solid rgba(220,160,50,.2);margin-left:.5rem;vertical-align:middle;}

hr{border:none;border-top:1px solid rgba(220,160,50,.07);margin:2rem 0;}

footer a{color:inherit;text-decoration:none;border-bottom:1px solid rgba(220,160,50,.15);}
.hidden{display:none;}
.share-btn{font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.25em;text-transform:uppercase;color:rgba(220,160,50,.42);background:none;border:none;cursor:pointer;padding:0;transition:color .2s;}
.share-btn:hover{color:rgba(220,160,50,.75);}

<body>
<div class="wrap">

  <div class="topbar">

      <button class="share-btn" id="share-btn" onclick="shareApp()">↗ Share</button>

    </div>
  </div>

  <p class="eyebrow" id="eyebrow">Astronomy</p>

  <div class="filter-row" id="filter-row">
    <button class="filter-btn active" onclick="setFilter('all')" id="f-all">All</button>
    <button class="filter-btn" onclick="setFilter('solar')" id="f-solar">Solar</button>
    <button class="filter-btn" onclick="setFilter('lunar')" id="f-lunar">Lunar</button>
  </div>

  <div id="eclipse-grid"></div>

</div>

<script>
const ECLIPSES = [
  { utc:'2026-03-03T11:00:00Z', type:'lunar_total',
    en:{name:'Total Lunar Eclipse',date:'Mar 3, 2026',vis:'Europe · Africa · Asia · parts of Americas',detail:'Blood Moon — full totality. Duration: ~1h 45min'},
    es:{name:'Eclipse Lunar Total',date:'3 mar 2026',vis:'Europa · África · Asia · partes de América',detail:'Luna de Sangre — totalidad completa. Duración: ~1h 45min'}
  },
  { utc:'2026-08-12T17:47:00Z', type:'solar_total',
    en:{name:'Total Solar Eclipse',date:'Aug 12, 2026',vis:'Spain · Iceland · Greenland · North Africa',detail:'Totality: 2 min 18 sec · Path crosses Salamanca and Zamora, Spain'},
    es:{name:'Eclipse Solar Total',date:'12 ago 2026',vis:'España · Islandia · Groenlandia · Norte de África',detail:'Totalidad: 2 min 18 seg · El camino cruza Salamanca y Zamora, España'}
  },
  { utc:'2026-08-28T04:12:00Z', type:'lunar_partial',
    en:{name:'Partial Lunar Eclipse',date:'Aug 28, 2026',vis:'Western hemisphere',detail:'Penumbral eclipse — subtle dimming'},
    es:{name:'Eclipse Lunar Parcial',date:'28 ago 2026',vis:'Hemisferio occidental',detail:'Eclipse penumbral — leve oscurecimiento'}
  },
  { utc:'2027-02-17T00:01:00Z', type:'solar_annular',
    en:{name:'Annular Solar Eclipse',date:'Feb 17, 2027',vis:'South America · West Africa',detail:'Ring of fire visible along annular path'},
    es:{name:'Eclipse Solar Anular',date:'17 feb 2027',vis:'Sudamérica · África Occidental',detail:'Anillo de fuego visible a lo largo del camino anular'}
  },
  { utc:'2027-02-20T23:14:00Z', type:'lunar_total',
    en:{name:'Total Lunar Eclipse',date:'Feb 20, 2027',vis:'Americas · Europe · Africa',detail:'Blood Moon — full totality'},
    es:{name:'Eclipse Lunar Total',date:'20 feb 2027',vis:'Américas · Europa · África',detail:'Luna de Sangre — totalidad completa'}
  },
  { utc:'2027-08-02T10:07:00Z', type:'solar_total',
    en:{name:'Total Solar Eclipse',date:'Aug 2, 2027',vis:'Morocco · Spain · Middle East · India',detail:'Longest totality this century — 6 min 23 sec over Luxor, Egypt'},
    es:{name:'Eclipse Solar Total',date:'2 ago 2027',vis:'Marruecos · España · Oriente Medio · India',detail:'La totalidad más larga del siglo — 6 min 23 seg sobre Luxor, Egipto'}
  },
  { utc:'2027-08-17T07:14:00Z', type:'lunar_total',
    en:{name:'Total Lunar Eclipse',date:'Aug 17, 2027',vis:'Europe · Africa · Asia · Australia',detail:'Blood Moon — full totality'},
    es:{name:'Eclipse Lunar Total',date:'17 ago 2027',vis:'Europa · África · Asia · Australia',detail:'Luna de Sangre — totalidad completa'}
  },
  { utc:'2028-01-12T04:13:00Z', type:'lunar_partial',
    en:{name:'Partial Lunar Eclipse',date:'Jan 12, 2028',vis:'Americas · Europe · Africa',detail:'Partial umbral eclipse'},
    es:{name:'Eclipse Lunar Parcial',date:'12 ene 2028',vis:'Américas · Europa · África',detail:'Eclipse umbral parcial'}
  },
  { utc:'2028-01-26T15:09:00Z', type:'solar_annular',
    en:{name:'Annular Solar Eclipse',date:'Jan 26, 2028',vis:'South America · Europe · North Africa',detail:'Ring of fire visible across Atlantic regions'},
    es:{name:'Eclipse Solar Anular',date:'26 ene 2028',vis:'Sudamérica · Europa · Norte de África',detail:'Anillo de fuego visible en regiones atlánticas'}
  },
  { utc:'2028-07-06T18:20:00Z', type:'lunar_partial',
    en:{name:'Partial Lunar Eclipse',date:'Jul 6, 2028',vis:'Asia · Australia · Pacific',detail:'Partial umbral eclipse'},
    es:{name:'Eclipse Lunar Parcial',date:'6 jul 2028',vis:'Asia · Australia · Pacífico',detail:'Eclipse umbral parcial'}
  },
  { utc:'2028-07-22T02:56:00Z', type:'solar_total',
    en:{name:'Total Solar Eclipse',date:'Jul 22, 2028',vis:'Australia · New Zealand',detail:'5 min 10 sec totality over southeastern Australia'},
    es:{name:'Eclipse Solar Total',date:'22 jul 2028',vis:'Australia · Nueva Zelanda',detail:'5 min 10 seg de totalidad sobre el sureste de Australia'}
  },
];

const ICONS = {solar_total:'☀️',solar_annular:'💍',lunar_total:'🌑',lunar_partial:'🌗',lunar_penumbral:'🌕'};
const YEARS = ['2026','2027','2028'];

const STRINGS = {
  en:{eyebrow:'Astronomy',h1:'Upcoming Eclipses',subtitle:'Solar and lunar eclipses 2026–2028',fAll:'All',fSolar:'Solar',fLunar:'Lunar',nextBadge:'Next',pastNote:'passed',back:'← Next Eclipse',navHistory:'History',navSupport:'Support',share:'Share',langBtn:'ES',fPrivacy:'Privacy',fHistory:'History',source:'Source: NASA Goddard Space Flight Center · <a href="https://eclipse.gsfc.nasa.gov" target="_blank" rel="noopener">eclipse.gsfc.nasa.gov</a>'},
  es:{eyebrow:'Astronomía',h1:'Próximos Eclipses',subtitle:'Eclipses solares y lunares 2026–2028',fAll:'Todos',fSolar:'Solares',fLunar:'Lunares',nextBadge:'Próximo',pastNote:'pasado',back:'← Next Eclipse',navHistory:'Historia',navSupport:'Apoya',share:'Compartir',langBtn:'EN',fPrivacy:'Privacidad',fHistory:'Historia',source:'Fuente: NASA Goddard Space Flight Center · <a href="https://eclipse.gsfc.nasa.gov" target="_blank" rel="noopener">eclipse.gsfc.nasa.gov</a>'}
};

let lang = localStorage.getItem('ne-lang')||(navigator.language.startsWith('es')?'es':'en');
let filter = 'all';
const now = Date.now();
const nextIdx = ECLIPSES.findIndex(e=>new Date(e.utc).getTime()>now);

function render(){
  document.documentElement.lang=lang;
  const S=STRINGS[lang];
  document.getElementById('eyebrow').textContent=S.eyebrow;
  document.getElementById('h1').textContent=S.h1;
  document.getElementById('subtitle').textContent=S.subtitle;
  document.getElementById('f-all').textContent=S.fAll;
  document.getElementById('f-solar').textContent=S.fSolar;
  document.getElementById('f-lunar').textContent=S.fLunar;
  document.getElementById('back-link').textContent=S.back;
  document.getElementById('nav-history').textContent=S.navHistory;
  document.getElementById('nav-support').textContent=S.navSupport;
  document.getElementById('lang-btn').textContent=S.langBtn;
  document.getElementById('share-btn').textContent='↗ '+S.share;
  document.getElementById('f-privacy').textContent=S.fPrivacy;
  document.getElementById('f-history').textContent=S.fHistory;
  document.getElementById('source-note').innerHTML=S.source;
  renderGrid();
}

function renderGrid(){
  const S=STRINGS[lang];
  const L=lang;
  const grid=document.getElementById('eclipse-grid');
  let html='';
  YEARS.forEach(yr=>{
    const items=ECLIPSES.map((e,i)=>({e,i})).filter(({e})=>{
      const d=new Date(e.utc);
      if(String(d.getUTCFullYear())!==yr)return false;
      if(filter==='solar'&&!e.type.startsWith('solar'))return false;
      if(filter==='lunar'&&!e.type.startsWith('lunar'))return false;
      return true;
    });
    if(!items.length)return;
    html+=`<div class="year-group"><div class="year-label">${yr}</div>`;
    items.forEach(({e,i})=>{
      const past=new Date(e.utc).getTime()<now;
      const isNext=i===nextIdx&&!past;
      html+=`<div class="${isNext?'card-next':''}${past?' card-passed':''}">
        <div class="eclipse-card">
          <div class="card-icon">${ICONS[e.type]||'🌑'}</div>
          <div class="card-body">
            <div class="card-name">${e[L].name}${isNext?`<span class="badge">${S.nextBadge}</span>`:''}</div>
            <div class="card-vis">${e[L].vis}</div>
            <div class="card-detail">${e[L].detail}</div>
          </div>
          <div class="card-date">${e[L].date}</div>
        </div>
      </div>`;
    });
    html+='</div>';
  });
  grid.innerHTML=html;
}

function setFilter(f){
  filter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  const map={all:'f-all',solar:'f-solar',lunar:'f-lunar'};
  document.getElementById(map[f]).classList.add('active');
  renderGrid();
}

function shareApp(){
  const d=document.querySelector('meta[name="description"]');
  const data={title:document.title,text:d?d.getAttribute('content'):'',url:window.location.href};
  if(navigator.share){navigator.share(data).catch(()=>{});}
  else{
    (navigator.clipboard?navigator.clipboard.writeText(data.url):Promise.reject())
    .then(()=>{const b=document.getElementById('share-btn');const o=b.textContent;b.textContent='✓';setTimeout(()=>b.textContent=o,2e3);})
    .catch(()=>{window.open('https://x.com/intent/tweet?url='+encodeURIComponent(data.url),'_blank');});
  }
}
function toggleLang(){
  lang=lang==='en'?'es':'en';
  localStorage.setItem('ne-lang',lang);
  render();
}

render();
</script>

<!-- ─ cookie consent ─ -->
<div id="ck" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:10000;background:rgba(3,3,4,.97);border-top:1px solid rgba(220,160,50,.12);padding:.75rem 1.5rem;align-items:center;gap:.75rem;flex-wrap:wrap;justify-content:space-between;font-family:'Cinzel',serif;">
  <span id="ck-t" style="font-family:'Cormorant Garamond',Georgia,serif;font-size:.95rem;color:rgba(220,205,170,.58);flex:1;min-width:200px;line-height:1.5;"></span>
  <div style="display:flex;gap:.5rem;flex-shrink:0;">
    <button onclick="neConsent(1)" id="ck-y" style="font-size:.64rem;letter-spacing:.2em;text-transform:uppercase;padding:.38rem .9rem;background:rgba(220,160,50,.1);border:1px solid rgba(220,160,50,.28);color:rgba(220,160,50,.82);border-radius:2px;cursor:pointer;font-family:inherit;"></button>
    <button onclick="neConsent(0)" id="ck-n" style="font-size:.64rem;letter-spacing:.2em;text-transform:uppercase;padding:.38rem .9rem;background:none;border:1px solid rgba(220,160,50,.1);color:rgba(220,160,50,.38);border-radius:2px;cursor:pointer;font-family:inherit;"></button>
  </div>
</div>
<script>
(function(){
  const K='ne-consent';
  const L=localStorage.getItem('ne-lang')||(navigator.language.startsWith('es')?'es':'en');
  const T={
    en:{t:'This site uses Google AdSense for contextual advertising. <a href="/privacy" style="color:rgba(220,160,50,.6);text-decoration:underline;">Privacy policy</a>.',y:'Accept',n:'Decline'},
    es:{t:'Este sitio usa Google AdSense para publicidad contextual. <a href="/privacy" style="color:rgba(220,160,50,.6);text-decoration:underline;">Política de privacidad</a>.',y:'Aceptar',n:'Rechazar'}
  };
  function push1(){(adsbygoogle=window.adsbygoogle||[]).push({});}
  function hide(){document.getElementById('ck').style.display='none';}
  window.neConsent=function(v){localStorage.setItem(K,String(v));hide();if(Number(v))push1();};
  const tt=T[L]||T.en;
  document.getElementById('ck-t').innerHTML=tt.t;
  document.getElementById('ck-y').textContent=tt.y;
  document.getElementById('ck-n').textContent=tt.n;
  const v=localStorage.getItem(K);
  if(v==='1')push1();
  else if(!v)document.getElementById('ck').style.display='flex';
})();
</script>
</body>
</html>
