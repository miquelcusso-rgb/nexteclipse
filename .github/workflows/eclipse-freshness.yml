name: Eclipse freshness

# Regenera a diario el contenido "próximo eclipse" desde data/eclipses.json +
# la fecha actual (build.mjs) y, si algo cambió, commitea + pushea → Vercel
# redespliega. Determinista, gratis, sin depender del Mac. Para forzar: pestaña
# Actions → "Run workflow". El contenido lo edita el equipo en eclipses.json.

on:
  schedule:
    - cron: '17 5 * * *'   # a diario 05:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: eclipse-freshness
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Regenerate eclipse content
        run: node build.mjs
      - name: Commit & push if changed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "eclipse-freshness-bot"
            git config user.email "noreply@next-eclipse.com"
            git add -A
            git commit -m "chore(auto): refrescar 'próximo eclipse' [skip ci]"
            git push
            echo "Pushed refreshed content."
          else
            echo "Sin cambios — el próximo eclipse no ha cambiado."
          fi
